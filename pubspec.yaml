name: offline_navigation
description: "Drop-in offline turn-by-turn navigation page for Flutter, powered by the Organic Maps engine. Downloads the required country map automatically and navigates fully offline."
version: 0.1.1
repository: https://github.com/fred-apina/offline_navigation
issue_tracker: https://github.com/fred-apina/offline_navigation/issues

topics:
  - navigation
  - maps
  - offline
  - routing
  - gps

environment:
  sdk: ^3.8.1
  flutter: '>=3.3.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_plugin_android_lifecycle: ^2.0.31

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  pigeon: ^26.1.2

flutter:
  plugin:
    platforms:
      android:
        package: io.github.fredapina.offline_navigation
        pluginClass: OfflineNavigationPlugin
